input:
  patch_len: 5
  num_patches: 50

tokenizers:
  type: mean
  attention:
    layers: 2
    heads: 4
    mlp_ratio: 4
  asset:
    hidden_dim: 64
    output_dim: 128
  market:
    hidden_dim: 32
    output_dim: 64
  macro:
    hidden_dim: 64
    output_dim: 64

asset_pooling:
  type: attention
  attention:
    layers: 2
    heads: 4
    mlp_ratio: 4

fusion:
  output_dim: 128
  dropout: 0.0

context_encoder:
  layers: 2
  heads: 4
  mlp_ratio: 4
  dropout: 0.1

predictor:
  layers: 2
  heads: 4
  mlp_ratio: 4
  dropout: 0.2

state_exporter:
  latent_dim: 8
