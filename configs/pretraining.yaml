run:
  name: v2-slow-lr
  output_root: runs/pretraining
  device: auto

configs:
  model: configs/model.yaml
  dataloader: configs/dataloader.yaml

optimization:
  optimizer: adamw
  lr: 0.0001
  min_lr: 0.0
  weight_decay: 0.1
  epochs: 600
  warmup_epochs: 5
  grad_clip_norm: 1.0
  mixed_precision: true

anti_collapse:
  variance_weight: 0.001
  covariance_weight: 0.0001
  variance_floor: 0.1
  epsilon: 0.0001

ema:
  momentum_start: 0.990
  momentum_end: 0.997

validation:
  every_epochs: 1

representation_evaluation:
  enabled: true
  every_epochs: 5
  views_per_date: 3
  pca_components: 16
  export_embeddings_every_validation: false

checkpointing:
  every_steps: 1000

logging:
  every_steps: 10
