# Live FRED-series configuration.
#
# Production code currently reads only feature_groups.macro_daily and
# feature_groups.macro_slow. Derived macro features are implemented in
# src/dataset_pipeline/macro_features.py. Asset and market feature definitions
# are implemented in their dataset_pipeline modules, not in this file.

feature_groups:
  macro_daily:
    enabled: true
    series:
      vix:
        series_id: VIXCLS
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      treasury_3m:
        series_id: DGS3MO
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      treasury_2y:
        series_id: DGS2
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      treasury_10y:
        series_id: DGS10
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      treasury_30y:
        series_id: DGS30
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      high_yield_oas:
        series_id: BAMLH0A0HYM2
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      corporate_oas:
        series_id: BAMLC0A0CM
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false
      fed_funds:
        series_id: DFF
        source: fred
        lag_policy: same_day_after_close
        revised_data_flag: false

  # Disabled until revised slow macro series have an intentionally validated
  # release-lag or point-in-time-vintage policy.
  macro_slow:
    enabled: false
    default_lag_policy: conservative_release_lag
    series:
      unemployment:
        series_id: UNRATE
        source: fred
        lag_business_days: 5
        revised_data_flag: true
      cpi:
        series_id: CPIAUCSL
        source: fred
        lag_business_days: 15
        revised_data_flag: true
      industrial_production:
        series_id: INDPRO
        source: fred
        lag_business_days: 15
        revised_data_flag: true
      chicago_fed_nfci:
        series_id: NFCI
        source: fred
        lag_business_days: 7
        revised_data_flag: true
